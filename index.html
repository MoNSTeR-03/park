<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔥 LA LLAMA DEL DESEO | AHMAD 🌙 RYOKO 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Courier New', 'Segoe UI', monospace;
            background-color: #0a0005;
            color: white;
        }

        /* UI Panel - MOVED TO TOP so flame is fully visible */
        .ui-panel {
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            margin: 0 16px;
            padding: 12px 16px;
            border: 1px solid #ff4466;
            box-shadow: 0 0 20px rgba(255, 68, 102, 0.4);
            z-index: 20;
            text-align: center;
            pointer-events: auto;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .message-box {
            background: #1a0510dd;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 4px solid #ff4466;
            color: #ffe0f0;
            font-size: 0.75rem;
            line-height: 1.4;
            max-height: 100px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .flame-counter {
            font-size: 0.7rem;
            color: #ffaa99;
            margin-bottom: 6px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .interact-btn {
            background: #ff4466aa;
            border: 1px solid #ff6688;
            padding: 8px 20px;
            border-radius: 50px;
            color: #fff0f0;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-block;
            transition: 0.1s;
            backdrop-filter: blur(4px);
            margin-top: 4px;
            font-family: monospace;
        }

        .interact-btn:active {
            transform: scale(0.96);
            background: #ff6688cc;
        }

        .reset-btn {
            background: #443344aa;
            border: 1px solid #ff88aa;
            padding: 6px 16px;
            border-radius: 50px;
            color: #ffe0ff;
            font-weight: bold;
            font-size: 0.65rem;
            cursor: pointer;
            display: inline-block;
            margin-left: 10px;
            transition: 0.1s;
        }

        .reset-btn:active {
            transform: scale(0.96);
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
        }

        .title {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #ffccaa;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px;
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(4px);
            z-index: 20;
            pointer-events: none;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .message-box { font-size: 0.65rem; max-height: 85px; }
            .ui-panel { padding: 10px 12px; top: 60px; }
            .interact-btn { padding: 6px 16px; font-size: 0.7rem; }
            .reset-btn { padding: 5px 12px; font-size: 0.6rem; }
            .flame-counter { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <div class="title">🔥 AHMAD ❤️ RYOKO | LA LLAMA DEL DESEO 🔥</div>
    <div class="ui-panel" id="uiPanel">
        <div class="flame-counter" id="flameCounter">💋 VECES QUE LA LLAMA ARDIÓ POR TI: 0/6 💋</div>
        <div class="message-box" id="romanticMessage">
            ✨ Toca la LLAMA ROJA en el centro ✨<br>
            Cada vez que la toques, cambiará de color y Ahmad te enviará un mensaje. 🔥💜
        </div>
        <div class="button-group">
            <div class="interact-btn" id="interactBtn">🔥 TOCAR LA LLAMA 🔥</div>
            <div class="reset-btn" id="resetBtn">🔄 REINICIAR</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- setup scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050108);
        scene.fog = new THREE.FogExp2(0x050108, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 5.5);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- lights ---
        const ambientLight = new THREE.AmbientLight(0x221122);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffaa88, 0.8);
        mainLight.position.set(2, 3, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const backLight = new THREE.PointLight(0xff4466, 0.5);
        backLight.position.set(0, 1.5, -1);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0xff88aa, 0.4);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        // --- starfield background ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffccdd, size: 0.1, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // --- floating particles ---
        const emberCount = 500;
        const emberPositions = new Float32Array(emberCount * 3);
        for (let i = 0; i < emberCount; i++) {
            emberPositions[i*3] = (Math.random() - 0.5) * 6;
            emberPositions[i*3+1] = Math.random() * 3.5;
            emberPositions[i*3+2] = (Math.random() - 0.5) * 5;
        }
        const emberGeo = new THREE.BufferGeometry();
        emberGeo.setAttribute('position', new THREE.BufferAttribute(emberPositions, 3));
        const emberMat = new THREE.PointsMaterial({ color: 0xff6644, size: 0.035, transparent: true });
        const embers = new THREE.Points(emberGeo, emberMat);
        scene.add(embers);
        
        // --- ground circle ---
        const groundCircle = new THREE.Mesh(
            new THREE.CircleGeometry(3.2, 32),
            new THREE.MeshStandardMaterial({ color: 0x1a0a1a, roughness: 0.7, metalness: 0.1, emissive: 0x220011 })
        );
        groundCircle.rotation.x = -Math.PI / 2;
        groundCircle.position.y = -0.35;
        groundCircle.receiveShadow = true;
        scene.add(groundCircle);
        
        // --- small candles around ---
        const candleMat = new THREE.MeshStandardMaterial({ color: 0xccaa88 });
        for (let i = 0; i < 10; i++) {
            const angle = (i / 10) * Math.PI * 2;
            const radius = 2.8;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const candle = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.35, 8), candleMat);
            candle.position.set(x, -0.15, z);
            candle.castShadow = true;
            scene.add(candle);
            const smallFlame = new THREE.Mesh(
                new THREE.ConeGeometry(0.05, 0.12, 6),
                new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422, emissiveIntensity: 0.5 })
            );
            smallFlame.position.set(x, 0.18, z);
            scene.add(smallFlame);
        }
        
        // ========= AHMAD AND RYOKO CHARACTERS (3D) =========
        function createCharacter(color, posX, name) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.28, 0.25, 0.7, 16),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 })
            );
            body.position.y = 0.35;
            body.castShadow = true;
            group.add(body);
            
            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.28, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.2 })
            );
            head.position.y = 0.8;
            head.castShadow = true;
            group.add(head);
            
            // Eyes
            const eyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            eyeWhite.position.set(0.1, 0.88, 0.28);
            group.add(eyeWhite);
            const eyeWhiteL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            eyeWhiteL.position.set(-0.1, 0.88, 0.28);
            group.add(eyeWhiteL);
            
            const eyePupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), new THREE.MeshStandardMaterial({ color: 0x000000 }));
            eyePupil.position.set(0.1, 0.87, 0.33);
            group.add(eyePupil);
            const eyePupilL = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), new THREE.MeshStandardMaterial({ color: 0x000000 }));
            eyePupilL.position.set(-0.1, 0.87, 0.33);
            group.add(eyePupilL);
            
            // Hair
            const hair = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 16, 16),
                new THREE.MeshStandardMaterial({ color: name === "Ahmad" ? 0x442200 : 0x331144 })
            );
            hair.position.y = 1.02;
            hair.scale.set(1, 0.4, 1.1);
            group.add(hair);
            
            group.position.set(posX, 0.2, 0);
            return group;
        }
        
        const ahmad = createCharacter(0x3366aa, -1.2, "Ahmad");
        const ryoko = createCharacter(0xaa44aa, 1.2, "Ryoko");
        
        // Add crowns/details
        const ahmadCape = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.15, 8), new THREE.MeshStandardMaterial({ color: 0x8844aa }));
        ahmadCape.position.set(-1.2, 1.05, -0.2);
        scene.add(ahmadCape);
        
        const ryokoHairFlower = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff66aa }));
        ryokoHairFlower.position.set(1.2, 1.08, 0.25);
        scene.add(ryokoHairFlower);
        
        scene.add(ahmad);
        scene.add(ryoko);
        
        // Kiss animation variables
        let isKissing = false;
        let kissProgress = 0;
        
        function startKiss() {
            isKissing = true;
            kissProgress = 0;
        }
        
        function updateKissAnimation() {
            if (isKissing) {
                kissProgress += 0.03;
                if (kissProgress >= 1) {
                    isKissing = false;
                    ahmad.position.x = -1.2;
                    ryoko.position.x = 1.2;
                    ahmad.position.z = 0;
                    ryoko.position.z = 0;
                } else {
                    const ease = Math.sin(kissProgress * Math.PI / 2);
                    const newX = -1.2 + (1.8 * ease);
                    ahmad.position.x = newX;
                    ryoko.position.x = -newX;
                    // Lean forward for kiss
                    ahmad.position.z = -0.2 * ease;
                    ryoko.position.z = -0.2 * ease;
                    // Rotate heads slightly
                    ahmad.children[1].rotation.x = ease * 0.3;
                    ryoko.children[1].rotation.x = ease * 0.3;
                }
            }
        }
        
        // --- MAIN FLAME ---
        const flameGroup = new THREE.Group();
        
        const innerFlame = new THREE.Mesh(
            new THREE.ConeGeometry(0.25, 0.7, 16),
            new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4422, emissiveIntensity: 0.9 })
        );
        innerFlame.position.y = 0;
        
        const middleFlame = new THREE.Mesh(
            new THREE.ConeGeometry(0.36, 0.95, 16),
            new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: 0xff3311, emissiveIntensity: 0.7 })
        );
        middleFlame.position.y = -0.1;
        
        const outerFlame = new THREE.Mesh(
            new THREE.ConeGeometry(0.5, 1.25, 16),
            new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xff2200, emissiveIntensity: 0.5 })
        );
        outerFlame.position.y = -0.2;
        
        const glowBase = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xff3311, emissiveIntensity: 0.6, transparent: true, opacity: 0.5 })
        );
        glowBase.position.y = -0.2;
        
        flameGroup.add(innerFlame);
        flameGroup.add(middleFlame);
        flameGroup.add(outerFlame);
        flameGroup.add(glowBase);
        flameGroup.position.set(0, 0.3, 0);
        scene.add(flameGroup);
        
        // Heart particles around flame
        const heartParticles = [];
        for (let i = 0; i < 40; i++) {
            const heart = new THREE.Mesh(
                new THREE.SphereGeometry(0.06, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff3366, emissiveIntensity: 0.4 })
            );
            heart.userData = {
                angle: Math.random() * Math.PI * 2,
                radius: 0.9 + Math.random() * 0.9,
                speed: 0.008 + Math.random() * 0.012,
                yOffset: Math.random() * 1.6
            };
            flameGroup.add(heart);
            heartParticles.push(heart);
        }
        
        // --- interaction logic ---
        let interactions = 0;
        let poemRevealed = false;
        
        const flameColors = [
            { inner: 0xffaa66, middle: 0xff6644, outer: 0xff4422, intensity: 0.9 },
            { inner: 0xff8866, middle: 0xff5544, outer: 0xff3333, intensity: 1.0 },
            { inner: 0xff6688, middle: 0xff4488, outer: 0xff2266, intensity: 1.1 },
            { inner: 0xff44aa, middle: 0xff33aa, outer: 0xff2299, intensity: 1.2 },
            { inner: 0xff33cc, middle: 0xff22aa, outer: 0xff1199, intensity: 1.3 },
            { inner: 0xff22ff, middle: 0xff11dd, outer: 0xff00cc, intensity: 1.4 },
            { inner: 0xff11ff, middle: 0xff00ee, outer: 0xdd00ff, intensity: 1.5 }
        ];
        
        const messages = [
            "💋 AHMAD → RYOKO 💋\n\nRyoko, esta llama arde como mi corazón cuando te veo. Cada chispa me recuerda tu mirada, ese fuego que llevas dentro. Eres mi deseo más profundo, mi estrella favorita. 🔥",
            
            "🌶️ AHMAD → RYOKO 🌶️\n\nRyoko… cada vez que la llama crece, imagino que eres tú acercándote con esa sonrisa peligrosa. Quiero sentir tu mordida en mi labio. Eres fuego puro, guerrera. 😈💕",
            
            "💗 AHMAD → RYOKO 💗\n\nEsta llama es como nuestro amor: intenso, salvaje, imposible de apagar. Ryoko, eres mi combustible, mi razón para brillar. Gracias por existir. 🔥💜",
            
            "😏 AHMAD → RYOKO 😏\n\nRyoko, esta llama se parece a tus ojos cuando me miras con deseo. Me derrites, mujer. Quiero robarte un beso bajo las estrellas. Eres mía. 🌙💋",
            
            "💎 AHMAD → RYOKO 💎\n\nTe prometo, Ryoko, que mientras esta llama exista, mi amor por ti será eterno. Tú eres mi centro, mi hogar, mi fuego interno. Te quiero con locura. 🔥💗",
            
            "💕 AHMAD → RYOKO 💕\n\nRyoko, eres la dueña de mi alma. Cuando ríes, el universo se llena de color. Cuando vuelas, las estrellas te envidian. Eres mi guerrera, mi amor, mi todo. 💗✨"
        ];
        
        const finalPoem = `
╔══════════════════════════════════════════╗
║     💗 POEMA DE AHMAD PARA RYOKO 💗      ║
╚══════════════════════════════════════════╝

Ryoko, llama indomable,
fuego que el espacio no apaga.
Llegaste a mi vida como un incendio,
y ahora eres mi luz, mi playa.

Tu sonrisa enciende galaxias,
tu mirada derrota el vacío.
No hay estrella que te iguale,
ni deseo que sea tan mío.

Muérdeme con tu pasión salvaje,
bésame con todo tu ser.
Porque contigo, mi guerrera,
cada noche es amanecer.

Por siempre tuyo,
— Ahmad 💕🔥
✨✨✨✨✨✨✨✨✨✨✨✨✨
        `;
        
        function updateFlameAppearance(count) {
            const idx = Math.min(count, 6);
            const colors = flameColors[idx];
            if (colors) {
                innerFlame.material.color.setHex(colors.inner);
                middleFlame.material.color.setHex(colors.middle);
                outerFlame.material.color.setHex(colors.outer);
                innerFlame.material.emissiveIntensity = colors.intensity;
                middleFlame.material.emissiveIntensity = colors.intensity * 0.8;
                outerFlame.material.emissiveIntensity = colors.intensity * 0.6;
                glowBase.material.emissiveIntensity = colors.intensity * 0.5;
                backLight.intensity = 0.4 + count * 0.15;
            }
        }
        
        function updateCounterUI() {
            const counterDiv = document.getElementById('flameCounter');
            if (counterDiv) {
                if (!poemRevealed) {
                    counterDiv.innerHTML = `💋 VECES QUE LA LLAMA ARDIÓ POR TI: ${interactions}/6 💋`;
                } else {
                    counterDiv.innerHTML = `💞 ¡AHMAD Y RYOKO SE BESAN! AMOR ETERNO 💞`;
                }
            }
        }
        
        function showMessage(msg) {
            const msgBox = document.getElementById('romanticMessage');
            if (msgBox) {
                msgBox.innerHTML = msg;
                msgBox.scrollTop = 0;
            }
        }
        
        function showPoemAndKiss() {
            if (poemRevealed) return;
            poemRevealed = true;
            showMessage(`💖💖💖 ¡RYOKO, GUERRERA! HAS AVIVADO LA LLAMA COMPLETA 💖💖💖\n\n${finalPoem}\n\n🌹 Ahmad y Ryoko se besan bajo la llama eterna... 🔥💋🌹`);
            updateCounterUI();
            
            // Start the kiss animation!
            startKiss();
            
            // Visual celebration
            for (let i = 0; i < 100; i++) {
                const heart = new THREE.Mesh(
                    new THREE.SphereGeometry(0.07, 8, 8),
                    new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288 })
                );
                heart.position.set((Math.random() - 0.5) * 4, Math.random() * 4, (Math.random() - 0.5) * 4);
                scene.add(heart);
                setTimeout(() => scene.remove(heart), 2000);
            }
            
            // Make flame super intense
            innerFlame.material.emissiveIntensity = 2.2;
            middleFlame.material.emissiveIntensity = 2.0;
            outerFlame.material.emissiveIntensity = 1.8;
        }
        
        function interactWithFlame() {
            if (poemRevealed) {
                showMessage("💗 La llama es eterna. Ahmad y Ryoko ya se besaron. Reinicia para revivir la magia. 💗");
                return;
            }
            
            if (interactions < 6) {
                interactions++;
                updateFlameAppearance(interactions);
                updateCounterUI();
                
                if (interactions <= messages.length) {
                    showMessage(`🔥🔥🔥 ${messages[interactions - 1]} 🔥🔥🔥`);
                }
                
                // Scale animation
                flameGroup.scale.set(1.15, 1.15, 1.15);
                setTimeout(() => { flameGroup.scale.set(1, 1, 1); }, 150);
                
                // Sparks
                for (let i = 0; i < 25; i++) {
                    const spark = new THREE.Mesh(
                        new THREE.SphereGeometry(0.04, 4, 4),
                        new THREE.MeshStandardMaterial({ color: 0xff6688, emissive: 0xff4466 })
                    );
                    spark.position.set((Math.random() - 0.5) * 1.2, Math.random() * 1.8, (Math.random() - 0.5) * 1.2);
                    flameGroup.add(spark);
                    setTimeout(() => flameGroup.remove(spark), 400);
                }
                
                if (interactions === 6) {
                    setTimeout(() => showPoemAndKiss(), 500);
                }
            }
        }
        
        // Animation
        let time = 0;
        function animateFlame() {
            time += 0.03;
            const flicker = 0.85 + Math.sin(time * 20) * 0.08;
            const flickerY = 0.9 + Math.sin(time * 25) * 0.05;
            innerFlame.scale.set(flicker, flickerY, flicker);
            middleFlame.scale.set(flicker * 1.05, flickerY * 1.02, flicker * 1.05);
            outerFlame.scale.set(flicker * 1.1, flickerY * 1.05, flicker * 1.1);
            glowBase.scale.set(1 + Math.sin(time * 15) * 0.05, 1 + Math.sin(time * 15) * 0.05, 1 + Math.sin(time * 15) * 0.05);
            
            heartParticles.forEach((heart, idx) => {
                const data = heart.userData;
                if (data) {
                    data.angle += data.speed;
                    const x = Math.cos(data.angle + idx) * data.radius;
                    const z = Math.sin(data.angle + idx) * data.radius;
                    heart.position.x = x;
                    heart.position.z = z;
                    heart.position.y = data.yOffset + Math.sin(time * 2 + idx) * 0.1;
                }
            });
            
            stars.rotation.y += 0.0005;
            embers.rotation.y += 0.008;
            updateKissAnimation();
        }
        
        // Event listeners
        const interactBtn = document.getElementById('interactBtn');
        if (interactBtn) {
            interactBtn.addEventListener('click', () => interactWithFlame());
            interactBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                interactWithFlame();
            });
        }
        
        // Click on 3D flame
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function onFlameClick(event) {
            if (poemRevealed) return;
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            mouse.set(x, y);
            raycaster.setFromCamera(mouse, camera);
            const flameMeshes = [innerFlame, middleFlame, outerFlame, glowBase];
            const intersects = raycaster.intersectObjects(flameMeshes);
            if (intersects.length > 0) interactWithFlame();
        }
        
        window.addEventListener('click', onFlameClick, false);
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length) {
                onFlameClick(e.touches[0]);
                e.preventDefault();
            }
        });
        
        // Reset
        document.getElementById('resetBtn').addEventListener('click', () => {
            interactions = 0;
            poemRevealed = false;
            isKissing = false;
            kissProgress = 0;
            ahmad.position.x = -1.2;
            ryoko.position.x = 1.2;
            ahmad.position.z = 0;
            ryoko.position.z = 0;
            ahmad.children[1].rotation.x = 0;
            ryoko.children[1].rotation.x = 0;
            updateFlameAppearance(0);
            updateCounterUI();
            showMessage("✨ La llama renació. Toca el fuego otra vez... Ahmad tiene más mensajes para ti. 🔥💜");
        });
        
        function animate() {
            requestAnimationFrame(animate);
            animateFlame();
            renderer.render(scene, camera);
        }
        animate();
        
        updateFlameAppearance(0);
        updateCounterUI();
    </script>
</body>
</html>
