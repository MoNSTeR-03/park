<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔥 LA LLAMA DEL DESEO | AHMAD 🌙 RYOKO 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Courier New', 'Segoe UI', monospace;
            background-color: #0a0005;
            color: white;
        }

        .ui-panel {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            margin: 0 16px;
            padding: 12px 16px;
            border: 1px solid #ff4466;
            box-shadow: 0 0 20px rgba(255, 68, 102, 0.4);
            z-index: 20;
            text-align: center;
            pointer-events: auto;
        }

        .message-box {
            background: #1a0510dd;
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #ff4466;
            color: #ffe0f0;
            font-size: 0.75rem;
            line-height: 1.5;
            max-height: 120px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .flame-counter {
            font-size: 0.7rem;
            color: #ffaa99;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .interact-btn {
            background: #ff4466aa;
            border: 1px solid #ff6688;
            padding: 8px 24px;
            border-radius: 50px;
            color: #fff0f0;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-block;
            transition: 0.1s;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }

        .interact-btn:active {
            transform: scale(0.96);
            background: #ff6688cc;
        }

        .reset-btn {
            background: #443344aa;
            border: 1px solid #ff88aa;
            padding: 8px 20px;
            border-radius: 50px;
            color: #ffe0ff;
            font-weight: bold;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-block;
            margin-left: 12px;
            transition: 0.1s;
        }

        .reset-btn:active {
            transform: scale(0.96);
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
        }

        .title {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #ffccaa;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px;
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(4px);
            z-index: 20;
            pointer-events: none;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .message-box { font-size: 0.65rem; max-height: 100px; }
            .interact-btn { padding: 6px 18px; font-size: 0.75rem; }
            .reset-btn { padding: 6px 14px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <div class="title">🔥 AHMAD ❤️ RYOKO | LA LLAMA DEL DESEO 🔥</div>
    <div class="ui-panel" id="uiPanel">
        <div class="flame-counter" id="flameCounter">💋 VECES QUE LA LLAMA ARDIÓ POR TI: 0/6 💋</div>
        <div class="message-box" id="romanticMessage">
            ✨ Toca la LLAMA en el centro ✨<br>
            Cada vez que la toques, cambiará de color y recibirás un mensaje de Ahmad. 🔥💜
        </div>
        <div class="button-group">
            <div class="interact-btn" id="interactBtn">🔥 TOCAR LA LLAMA 🔥</div>
            <div class="reset-btn" id="resetBtn">🔄 REINICIAR</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050108);
        scene.fog = new THREE.FogExp2(0x050108, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 7);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x221122);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffaa88, 1);
        mainLight.position.set(3, 5, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0xff4466, 0.8);
        backLight.position.set(0, 1.5, -2);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xff88aa, 0.5);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);

        // Stars background
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < 2000; i++) {
            starPos.push((Math.random() - 0.5) * 300);
            starPos.push((Math.random() - 0.5) * 150);
            starPos.push((Math.random() - 0.5) * 100 - 50);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffccdd, size: 0.1, transparent: true, opacity: 0.6 }));
        scene.add(stars);

        // Floating particles
        const particleCount = 1000;
        const particlePos = [];
        for (let i = 0; i < particleCount; i++) {
            particlePos.push((Math.random() - 0.5) * 10);
            particlePos.push(Math.random() * 5);
            particlePos.push((Math.random() - 0.5) * 8);
        }
        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particlePos), 3));
        const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0xff6644, size: 0.04, transparent: true }));
        scene.add(particles);

        // Ground
        const ground = new THREE.Mesh(new THREE.CircleGeometry(4.5, 32), new THREE.MeshStandardMaterial({ color: 0x1a0a1a, roughness: 0.7, emissive: 0x220011 }));
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // Candles around
        for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2;
            const r = 3.5;
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            const candle = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.4, 8), new THREE.MeshStandardMaterial({ color: 0xccaa88 }));
            candle.position.set(x, -0.25, z);
            candle.castShadow = true;
            scene.add(candle);
            const smallFlame = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.14, 6), new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422, emissiveIntensity: 0.5 }));
            smallFlame.position.set(x, 0.12, z);
            scene.add(smallFlame);
        }

        // ========= AHMAD AND RYOKO (Simple but cute 3D characters) =========
        function createCharacter(bodyColor, posX, hairColor, nameColor) {
            const group = new THREE.Group();
            // Body
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.3, 0.85, 16), new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.3 }));
            body.position.y = 0.4;
            body.castShadow = true;
            group.add(body);
            // Head
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.2 }));
            head.position.y = 0.95;
            head.castShadow = true;
            group.add(head);
            // Eyes
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            eyeL.position.set(-0.14, 1.03, 0.35);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.08, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            eyeR.position.set(0.14, 1.03, 0.35);
            group.add(eyeR);
            const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.05, 24, 24), new THREE.MeshStandardMaterial({ color: 0x000000 }));
            pupilL.position.set(-0.14, 1.02, 0.42);
            group.add(pupilL);
            const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.05, 24, 24), new THREE.MeshStandardMaterial({ color: 0x000000 }));
            pupilR.position.set(0.14, 1.02, 0.42);
            group.add(pupilR);
            // Hair
            const hair = new THREE.Mesh(new THREE.SphereGeometry(0.38, 24, 24), new THREE.MeshStandardMaterial({ color: hairColor }));
            hair.position.y = 1.18;
            hair.scale.set(1, 0.4, 1.1);
            group.add(hair);
            group.position.set(posX, 0.2, 0);
            return group;
        }

        const ahmad = createCharacter(0x3366aa, -2.2, 0x442200);
        const ryoko = createCharacter(0xaa44aa, 2.2, 0x661166);
        scene.add(ahmad);
        scene.add(ryoko);

        // Flying name labels (CSS2D)
        function createFlyingName(text, color) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '2rem';
            div.style.fontWeight = 'bold';
            div.style.fontFamily = 'monospace';
            div.style.textShadow = `0 0 20px ${color}`;
            div.style.background = 'rgba(0,0,0,0.5)';
            div.style.padding = '5px 15px';
            div.style.borderRadius = '50px';
            div.style.border = `2px solid ${color}`;
            div.style.backdropFilter = 'blur(8px)';
            div.style.whiteSpace = 'nowrap';
            return new CSS2DObject(div);
        }

        const ahmadName = createFlyingName('🔥 AHMAD 🔥', '#ff6688');
        const ryokoName = createFlyingName('💜 RYOKO 💜', '#ff88cc');
        ahmadName.position.set(-2.2, 1.5, 0);
        ryokoName.position.set(2.2, 1.5, 0);
        scene.add(ahmadName);
        scene.add(ryokoName);

        // ========= MAIN FLAME =========
        const flameGroup = new THREE.Group();
        const innerF = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.85, 24), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4422, emissiveIntensity: 0.9 }));
        innerF.position.y = 0;
        const middleF = new THREE.Mesh(new THREE.ConeGeometry(0.42, 1.1, 24), new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: 0xff3311, emissiveIntensity: 0.7 }));
        middleF.position.y = -0.1;
        const outerF = new THREE.Mesh(new THREE.ConeGeometry(0.58, 1.45, 24), new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xff2200, emissiveIntensity: 0.5 }));
        outerF.position.y = -0.2;
        const glow = new THREE.Mesh(new THREE.SphereGeometry(0.65, 24, 24), new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xff3311, emissiveIntensity: 0.5, transparent: true, opacity: 0.5 }));
        glow.position.y = -0.2;
        flameGroup.add(innerF, middleF, outerF, glow);
        flameGroup.position.set(0, 0.4, 0);
        scene.add(flameGroup);

        // Heart particles orbiting
        const orbitingHearts = [];
        for (let i = 0; i < 50; i++) {
            const heart = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12, 12), new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff3366, emissiveIntensity: 0.5 }));
            heart.userData = { angle: Math.random() * Math.PI * 2, radius: 1.1 + Math.random() * 1.2, speed: 0.008 + Math.random() * 0.02, yOff: Math.random() * 2 };
            flameGroup.add(heart);
            orbitingHearts.push(heart);
        }

        // Messages
        const messages = [
            "💋 AHMAD → RYOKO 💋\n\nMi guerrera, esta llama que ves ahora es solo un reflejo de lo que siento cada vez que pienso en ti. Tus ojos tienen el poder de encender galaxias enteras. Eres fuego, eres pasión, eres el deseo más profundo que habita en mi pecho. 🔥💜",
            "🌶️ AHMAD → RYOKO 🌶️\n\nRyoko… cuando muerdes tu labio con esa sonrisa traviesa, siento que pierdo el control. Quiero sentir tu mordida en mi piel, quiero que me quemes con esa pasión salvaje que llevas dentro. Eres fuego puro, guerrera indomable. 😈💕",
            "💗 AHMAD → RYOKO 💗\n\nEsta llama es como nuestro amor: intenso, salvaje, imposible de apagar. Por más tormentas que lleguen, nada va a extinguir lo que siento por ti. Eres mi combustible, mi razón para brillar. Gracias por existir. 🔥💜",
            "😏 AHMAD → RYOKO 😏\n\nRyoko, esta llama se parece a tus ojos cuando me miras con deseo. Me derrites, mujer. Quiero robarte un beso bajo las estrellas. Eres adictiva, peligrosa, hermosa… y eres mía. 🌙💋",
            "💎 AHMAD → RYOKO 💎\n\nTe prometo, Ryoko, que mientras esta llama exista, mi amor por ti será eterno. Tú eres mi centro, mi hogar, mi fuego interno. Cada latido de mi corazón lleva tu nombre. Te quiero con locura. 🔥💗",
            "💕 AHMAD → RYOKO 💕\n\nRyoko, dueña absoluta de mi alma. Cuando ríes, el universo se llena de color. Cuando vuelas, las estrellas te envidian. Eres mi guerrera, mi amor, mi todo. Para siempre. 💗✨"
        ];

        const finalPoem = `
╔══════════════════════════════════════════╗
║     💗 POEMA DE AHMAD PARA RYOKO 💗      ║
╚══════════════════════════════════════════╝

Ryoko, llama indomable,
fuego que el espacio no apaga.
Llegaste a mi vida como un huracán,
y ahora eres mi luz, mi magia.

Tu sonrisa enciende galaxias,
tu mirada derrota el vacío.
No hay estrella que brille como tú,
ni deseo que sea tan mío.

Muérdeme con tu pasión salvaje,
bésame con toda tu verdad.
Porque contigo, mi guerrera,
cada noche es eternidad.

Ryoko, dueña de mis sueños,
tú eres mi único amor sin fin.

— Ahmad 💕🔥
        `;

        let interactions = 0;
        let poemShown = false;
        let moveTogether = false;
        let moveProgress = 0;

        const flameColors = [
            { inner: 0xffaa66, middle: 0xff6644, outer: 0xff4422, intensity: 0.9 },
            { inner: 0xff8866, middle: 0xff5544, outer: 0xff3333, intensity: 1.0 },
            { inner: 0xff6688, middle: 0xff4488, outer: 0xff2266, intensity: 1.1 },
            { inner: 0xff44aa, middle: 0xff33aa, outer: 0xff2299, intensity: 1.2 },
            { inner: 0xff33cc, middle: 0xff22aa, outer: 0xff1199, intensity: 1.3 },
            { inner: 0xff22ff, middle: 0xff11dd, outer: 0xff00cc, intensity: 1.4 },
            { inner: 0xff11ff, middle: 0xff00ee, outer: 0xdd00ff, intensity: 1.8 }
        ];

        function updateFlame(count) {
            const idx = Math.min(count, 6);
            const c = flameColors[idx];
            if (c) {
                innerF.material.color.setHex(c.inner);
                middleF.material.color.setHex(c.middle);
                outerF.material.color.setHex(c.outer);
                innerF.material.emissiveIntensity = c.intensity;
                middleF.material.emissiveIntensity = c.intensity * 0.8;
                outerF.material.emissiveIntensity = c.intensity * 0.6;
                glow.material.emissiveIntensity = c.intensity * 0.5;
                backLight.intensity = 0.4 + count * 0.2;
            }
        }

        function updateUI() {
            const counter = document.getElementById('flameCounter');
            if (counter) {
                if (!poemShown) counter.innerHTML = `💋 VECES QUE LA LLAMA ARDIÓ POR TI: ${interactions}/6 💋`;
                else counter.innerHTML = `💞 ¡AHMAD Y RYOKO SE BESAN! AMOR ETERNO 💞`;
            }
        }

        function showMsg(msg) {
            const box = document.getElementById('romanticMessage');
            if (box) {
                box.innerHTML = msg;
                box.scrollTop = 0;
            }
        }

        function createExplosion() {
            // Hearts explosion
            for (let i = 0; i < 250; i++) {
                const heart = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288 }));
                heart.position.set((Math.random() - 0.5) * 8, Math.random() * 6, (Math.random() - 0.5) * 8);
                heart.userData = { life: 1, velocity: new THREE.Vector3((Math.random() - 0.5) * 0.1, Math.random() * 0.15, (Math.random() - 0.5) * 0.1) };
                scene.add(heart);
                setTimeout(() => scene.remove(heart), 2000);
            }
            // Fire particles
            for (let i = 0; i < 150; i++) {
                const fire = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: 0xff4422 }));
                fire.position.set((Math.random() - 0.5) * 5, Math.random() * 4, (Math.random() - 0.5) * 5);
                scene.add(fire);
                setTimeout(() => scene.remove(fire), 1500);
            }
        }

        function startMoveAndKiss() {
            if (poemShown) return;
            poemShown = true;
            moveTogether = true;
            moveProgress = 0;
            showMsg(`💖💖💖 ¡RYOKO, GUERRERA! HAS COMPLETADO LA LLAMA DEL DESEO 💖💖💖\n\n${finalPoem}\n\n🔥💋 ¡AHMAD Y RYOKO SE ACERCAN Y SUS NOMBRES VUELAN CON CORAZONES! 💋🔥`);
            updateUI();
            createExplosion();
            
            innerF.material.emissiveIntensity = 2.5;
            middleF.material.emissiveIntensity = 2.2;
            outerF.material.emissiveIntensity = 2.0;
        }

        function updateMoveAnimation() {
            if (!moveTogether) return;
            
            moveProgress += 0.025;
            if (moveProgress >= 1) {
                moveTogether = false;
                // Final positions - they meet in the middle
                ahmad.position.x = 0;
                ryoko.position.x = 0;
                ahmad.position.z = -0.3;
                ryoko.position.z = -0.3;
                ahmadName.position.x = 0;
                ryokoName.position.x = 0;
                ahmadName.position.y = 1.8;
                ryokoName.position.y = 1.8;
            } else {
                const ease = Math.sin(moveProgress * Math.PI / 2);
                // Move characters toward center
                const targetX = -2.2 + (2.2 * ease);
                ahmad.position.x = targetX;
                ryoko.position.x = -targetX;
                // Move names flying around
                ahmadName.position.x = targetX + Math.sin(moveProgress * Math.PI * 4) * 0.5;
                ryokoName.position.x = -targetX + Math.cos(moveProgress * Math.PI * 4) * 0.5;
                ahmadName.position.y = 1.5 + Math.sin(moveProgress * Math.PI * 6) * 0.3;
                ryokoName.position.y = 1.5 + Math.cos(moveProgress * Math.PI * 6) * 0.3;
                // Lean forward
                ahmad.position.z = -0.3 * ease;
                ryoko.position.z = -0.3 * ease;
                // Head tilt
                if (moveProgress > 0.7) {
                    const tilt = Math.sin((moveProgress - 0.7) * Math.PI * 3) * 0.25;
                    ahmad.children[1].rotation.x = tilt;
                    ryoko.children[1].rotation.x = tilt;
                }
            }
        }

        function interact() {
            if (poemShown) {
                showMsg("💗 La llama ya es eterna. Ahmad y Ryoko ya se besaron. Reinicia para revivir la magia. 💗");
                return;
            }
            if (interactions < 6) {
                interactions++;
                updateFlame(interactions);
                updateUI();
                showMsg(`🔥🔥🔥 ${messages[interactions - 1]} 🔥🔥🔥`);
                
                flameGroup.scale.set(1.15, 1.15, 1.15);
                setTimeout(() => flameGroup.scale.set(1, 1, 1), 150);
                
                // Sparks
                for (let i = 0; i < 40; i++) {
                    const spark = new THREE.Mesh(new THREE.SphereGeometry(0.045, 5, 5), new THREE.MeshStandardMaterial({ color: 0xff6688, emissive: 0xff4466 }));
                    spark.position.set((Math.random() - 0.5) * 1.5, Math.random() * 2.5, (Math.random() - 0.5) * 1.5);
                    flameGroup.add(spark);
                    setTimeout(() => flameGroup.remove(spark), 500);
                }
                
                if (interactions === 6) {
                    setTimeout(() => startMoveAndKiss(), 500);
                }
            }
        }

        // Animation loop
        let time = 0;
        function animate() {
            time += 0.035;
            
            // Flame flicker
            const flick = 0.85 + Math.sin(time * 22) * 0.09;
            const flickY = 0.88 + Math.sin(time * 27) * 0.07;
            innerF.scale.set(flick, flickY, flick);
            middleF.scale.set(flick * 1.04, flickY * 1.02, flick * 1.04);
            outerF.scale.set(flick * 1.08, flickY * 1.04, flick * 1.08);
            glow.scale.set(1 + Math.sin(time * 16) * 0.06, 1 + Math.sin(time * 16) * 0.06, 1 + Math.sin(time * 16) * 0.06);
            
            // Orbiting hearts
            orbitingHearts.forEach((h, idx) => {
                const d = h.userData;
                if (d) {
                    d.angle += d.speed;
                    h.position.x = Math.cos(d.angle + idx) * d.radius;
                    h.position.z = Math.sin(d.angle + idx) * d.radius;
                    h.position.y = d.yOff + Math.sin(time * 2.5 + idx) * 0.12;
                }
            });
            
            stars.rotation.y += 0.0003;
            particles.rotation.y += 0.005;
            
            updateMoveAnimation();
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();

        // Events
        document.getElementById('interactBtn').addEventListener('click', interact);
        document.getElementById('interactBtn').addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });
        
        const ray = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (e) => {
            if (poemShown) return;
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            ray.setFromCamera(mouse, camera);
            const hits = ray.intersectObjects([innerF, middleF, outerF, glow]);
            if (hits.length) interact();
        });
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length && !poemShown) {
                const rect = renderer.domElement.getBoundingClientRect();
                const touch = e.touches[0];
                mouse.x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;
                ray.setFromCamera(mouse, camera);
                const hits = ray.intersectObjects([innerF, middleF, outerF, glow]);
                if (hits.length) interact();
                e.preventDefault();
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            interactions = 0;
            poemShown = false;
            moveTogether = false;
            moveProgress = 0;
            ahmad.position.x = -2.2;
            ryoko.position.x = 2.2;
            ahmad.position.z = 0;
            ryoko.position.z = 0;
            ahmadName.position.x = -2.2;
            ryokoName.position.x = 2.2;
            ahmadName.position.y = 1.5;
            ryokoName.position.y = 1.5;
            ahmad.children[1].rotation.x = 0;
            ryoko.children[1].rotation.x = 0;
            updateFlame(0);
            updateUI();
            showMsg("✨ La llama renació. Toca el fuego otra vez... Ahmad tiene más mensajes profundos para ti. 🔥💜");
        });
        
        updateFlame(0);
        updateUI();
    </script>
</body>
</html>
