<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌅 PARQUE DEL AMOR | AHMAD 🌙 RYOKO 🌅</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', 'Segoe UI', monospace;
            color: white;
        }
        .ui-panel {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            margin: 0 16px 20px 16px;
            padding: 16px;
            border: 1px solid #ffaae0;
            box-shadow: 0 0 25px rgba(255, 100, 180, 0.5);
            z-index: 20;
            text-align: center;
            pointer-events: auto;
        }
        .message-box {
            background: #1a0525dd;
            border-radius: 28px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 5px solid #ff88dd;
            color: #fff0f5;
            font-size: 0.85rem;
            line-height: 1.5;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .counter {
            font-size: 0.75rem;
            color: #ffccff;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .reset-btn {
            background: #ff66aa44;
            border: 1px solid #ff99dd;
            padding: 8px 20px;
            border-radius: 60px;
            color: #ffe0ff;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-block;
            transition: 0.1s;
            backdrop-filter: blur(4px);
        }
        .reset-btn:active {
            transform: scale(0.96);
            background: #ff88aa88;
        }
        .title {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: #fff0dd;
            background: rgba(0,0,0,0.55);
            padding: 6px;
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(4px);
            z-index: 20;
            pointer-events: none;
            font-weight: bold;
        }
        @media (max-width: 600px) {
            .message-box { font-size: 0.7rem; max-height: 130px; }
            .ui-panel { padding: 12px; bottom: 12px; margin: 0 12px 12px 12px; }
        }
    </style>
</head>
<body>
    <div class="title">🌅 PARQUE DE LOS JURAMENTOS | AHMAD ✨ RYOKO 🌅</div>
    <div class="ui-panel" id="uiPanel">
        <div class="counter" id="progressCounter">🌸 FLORES: 0/5  |  🦊 ANIMALES: 0/5 🌸</div>
        <div class="message-box" id="romanticMessage">
            ✨ Toca las FLORES MORADAS o los ANIMALES que caminan...<br>
            Cada uno guarda un mensaje profundo de Ahmad para Ryoko. 💜
        </div>
        <div class="reset-btn" id="resetBtn">🔄 REINICIAR MAGIA DEL PARQUE 🔄</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- setup scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2a4f);
        scene.fog = new THREE.FogExp2(0x1a2a4f, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 5, 10);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 1.5, 0);
        controls.maxPolarAngle = Math.PI / 2.2;

        // --- SUN (5PM golden hour) ---
        const sunLight = new THREE.DirectionalLight(0xffcc88, 1.2);
        sunLight.position.set(5, 8, -3);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        scene.add(sunLight);
        
        const ambientLight = new THREE.AmbientLight(0x4a3a6a, 0.6);
        scene.add(ambientLight);
        
        const fillLight = new THREE.PointLight(0xffaa77, 0.5);
        fillLight.position.set(2, 3, 4);
        scene.add(fillLight);
        
        // --- sun sphere ---
        const sunSphere = new THREE.Mesh(
            new THREE.SphereGeometry(1.0, 64, 64),
            new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff6633, emissiveIntensity: 1.0 })
        );
        sunSphere.position.set(10, 7, -10);
        scene.add(sunSphere);
        
        // --- clouds ---
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffddbb, transparent: true, opacity: 0.7 });
        for (let i = 0; i < 10; i++) {
            const cloud = new THREE.Group();
            for (let j = 0; j < 3; j++) {
                const part = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), cloudMat);
                part.position.set((j - 1) * 0.5, 0, 0);
                cloud.add(part);
            }
            cloud.position.set((Math.random() - 0.5) * 15, 4 + Math.random() * 2, (Math.random() - 0.5) * 12 - 5);
            scene.add(cloud);
        }
        
        // --- stars (early evening) ---
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = [];
        for (let i = 0; i < 600; i++) {
            starPositions.push((Math.random() - 0.5) * 300);
            starPositions.push((Math.random() - 0.5) * 80 + 10);
            starPositions.push((Math.random() - 0.5) * 150 - 50);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPositions), 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xfff5cc, size: 0.12, transparent: true, opacity: 0.5 }));
        scene.add(stars);
        
        // --- GROUND ---
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x6aab6a, roughness: 0.9, metalness: 0.05 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(24, 24), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.3;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // --- grass patches ---
        for (let i = 0; i < 400; i++) {
            const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.08, 0.2, 3), new THREE.MeshStandardMaterial({ color: 0x7cb57c }));
            blade.position.x = (Math.random() - 0.5) * 20;
            blade.position.z = (Math.random() - 0.5) * 20;
            blade.position.y = -0.2;
            blade.castShadow = false;
            scene.add(blade);
        }
        
        // --- SHORT TREES ---
        for (let i = 0; i < 40; i++) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.45, 0.9, 6), new THREE.MeshStandardMaterial({ color: 0xaa7a4a }));
            trunk.position.x = (Math.random() - 0.5) * 17;
            trunk.position.z = (Math.random() - 0.5) * 17;
            trunk.position.y = 0.25;
            trunk.castShadow = true;
            const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.55, 0.8, 6), new THREE.MeshStandardMaterial({ color: 0x7cad5a }));
            foliage.position.y = 0.7;
            trunk.add(foliage);
            scene.add(trunk);
        }
        
        // ========= 5 PURPLE FLOWERS =========
        const flowerPositions = [
            { x: -3.2, z: 2.5, name: "🌷 FLOR DEL ALMA" },
            { x: 3.0, z: 3.0, name: "🌷 FLOR DEL DESEO" },
            { x: 4.0, z: -1.5, name: "🌷 FLOR DE LA PROMESA" },
            { x: -2.5, z: -3.0, name: "🌷 FLOR DEL VALOR" },
            { x: 0.5, z: -4.0, name: "🌷 FLOR ETERNA" }
        ];
        
        const flowerMessages = [
            "💜 AHMAD → RYOKO 💜\n\nRyoko, cada vez que veo una flor morada, recuerdo tu fuerza y tu belleza salvaje. No eres frágil como una flor común… eres una guerrera que florece incluso en tormentas interestelares. Gracias por elegir quedarte en mi jardín, por permitirme admirar tu luz sin quemarme. Eres mi primavera eterna, mi estación favorita. Te quiero con todo mi caos, con toda mi calma. 💜",
            
            "💋 AHMAD (picante) → RYOKO 💋\n\nRyoko… cuando caminas entre las flores, hasta ellas se sonrojan. Esa forma tuya de morderte el labio cuando tramas algo… me vuelve loco. Quiero robarte un beso al atardecer, justo cuando el sol se esconde y las estrellas empiezan a salir. Quiero sentir tu fuego cerca, tan cerca que olvide mi nombre. Eres peligrosa, guerrera. Y me encanta. Muérdeme el alma, Ryoko. Yo no voy a huir. 😈🌙",
            
            "💎 AHMAD → RYOKO 💎\n\nTe prometo, Ryoko, que cada día a tu lado será una aventura nueva. No importa si vuelas entre asteroides o si caminas despacio por este parque. Contigo, el tiempo no existe. Solo existe el ahora, y en este ahora yo elijo amarte con todo lo que soy. Eres mi tesoro más valioso, mi estrella fugaz favorita. Cuídate, guerrera, porque yo cuidaré de ti siempre. 💎",
            
            "🔥 AHMAD → RYOKO 🔥\n\nRyoko, tu mirada enciende este parque entero. No hay llama más hermosa que la que llevas dentro. Cuando ríes, las flores se abren. Cuando vuelas, el viento te sigue. Eres fuego y calma, tormenta y refugio. No sé cómo lo haces, pero me tienes completamente rendido. Sigue siendo tú, imparable, indomable. Yo solo quiero estar a tu lado para admirar el espectáculo. 🔥",
            
            "💗 AHMAD → RYOKO 💗\n\nRyoko, dueña de mi corazón. Cada pétalo de esta flor susurra tu nombre. No hay galaxia, ni planeta, ni rincón del universo que prefiera sobre estar contigo. Eres mi hogar, mi caos favorito, mi razón para sonreír cada mañana. Te quiero con todo lo que soy y con todo lo que sueño ser. Gracias por existir en mi mismo universo. 💗"
        ];
        
        const flowers = [];
        
        flowerPositions.forEach((pos, idx) => {
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.5, 6), new THREE.MeshStandardMaterial({ color: 0x5c9e3a }));
            stem.position.set(pos.x, -0.05, pos.z);
            scene.add(stem);
            
            const flowerHead = new THREE.Mesh(new THREE.SphereGeometry(0.32, 24, 24), new THREE.MeshStandardMaterial({ color: 0xbf5eff, emissive: 0x8822aa, emissiveIntensity: 0.4 }));
            flowerHead.position.set(pos.x, 0.35, pos.z);
            flowerHead.userData = { type: 'flower', index: idx, message: flowerMessages[idx] };
            scene.add(flowerHead);
            
            const div = document.createElement('div');
            div.textContent = `${flowerPositions[idx].name} 💜`;
            div.style.backgroundColor = 'rgba(80,20,90,0.85)';
            div.style.backdropFilter = 'blur(8px)';
            div.style.borderRadius = '40px';
            div.style.padding = '6px 14px';
            div.style.border = '2px solid #d98eff';
            div.style.fontSize = '0.7rem';
            div.style.fontWeight = 'bold';
            div.style.color = '#ffe2ff';
            div.style.fontFamily = 'monospace';
            div.style.cursor = 'pointer';
            div.style.pointerEvents = 'auto';
            const label = new CSS2DObject(div);
            label.position.set(pos.x, 0.85, pos.z);
            scene.add(label);
            
            flowers.push({
                mesh: flowerHead,
                label: label,
                discovered: false,
                message: flowerMessages[idx],
                index: idx
            });
        });
        
        // ========= 5 ANIMALS =========
        const animalNames = ["🦊 ZORRO ETERNO", "🐇 CONEJO DEL AMOR", "🦌 CIERVO SAGRADO", "🐿️ ARDILLA DULCE", "🦔 ERIZO DE LUZ"];
        const animalMessages = [
            "🦊 AHMAD → RYOKO 🦊\n\nEste zorro travieso lleva mi mensaje: te seguiría a cualquier galaxia, Ryoko. No importa la distancia, no importa el peligro. Eres mi estrella favorita, mi faro en la oscuridad. Cada vez que te veo volar, mi corazón late más fuerte. Quédate conmigo, guerrera. Prometo hacerte reír cada día. 💕",
            
            "🐇 AHMAD (picante) → RYOKO 🐇\n\nRyoko, este conejito saltarín es como tú cuando te acercas sin avisar… y de repente, ya estás mordiendo mi labio con esa sonrisa pícara. Me derrites, mujer. Quiero más de tu fuego, más de tus juegos, más de tus besos prohibidos. Eres adictiva, peligrosa, hermosa. Y lo mejor de todo… eres mía. 🌶️💋",
            
            "🦌 AHMAD → RYOKO 🦌\n\nEres tan libre como este ciervo, Ryoko. Vuelas entre estrellas, rompes asteroides, ríes en medio del caos. Y sin embargo, elegiste quedarte a mi lado. Eso es un regalo que no merezco, pero que voy a honrar cada día. Eres mi bendición, mi orgullo, mi guerrera favorita. 🌹",
            
            "🐿️ AHMAD → RYOKO 🐿️\n\nRyoko, mi corazón brinca como esta ardilla cada vez que sonríes. No importa si estás enojada, feliz, o flotando en el espacio vacío. Siempre, siempre pienso en ti. Eres mi primer pensamiento al despertar y mi último suspiro antes de dormir. Te quiero, guerrera. Con locura. 💗",
            
            "🦔 AHMAD → RYOKO 🦔\n\nAunque este erizo tenga espinas, Ahmad abraza a Ryoko sin miedo. Porque sé que detrás de tu armadura de guerrera hay un corazón gigante que late con fuerza. No tengas miedo de mostrarte suave conmigo. Yo voy a cuidar cada pedazo de ti. Tú eres mi hogar, Ryoko. Siempre. 🖤"
        ];
        
        const animalStartPos = [
            { x: -3.0, z: -2.2, color: 0xcc8844 },
            { x: 3.5, z: -1.0, color: 0xddbb99 },
            { x: 2.2, z: 3.2, color: 0xaa8866 },
            { x: -2.2, z: 3.5, color: 0xbb9966 },
            { x: 0.3, z: -3.5, color: 0xaa7755 }
        ];
        
        const animals = [];
        
        animalStartPos.forEach((pos, idx) => {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.38, 24, 24), new THREE.MeshStandardMaterial({ color: pos.color }));
            body.castShadow = true;
            group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 24, 24), new THREE.MeshStandardMaterial({ color: pos.color }));
            head.position.set(0.48, 0.15, 0);
            group.add(head);
            const earL = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.3, 8), new THREE.MeshStandardMaterial({ color: pos.color }));
            earL.position.set(-0.2, 0.45, 0);
            const earR = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.3, 8), new THREE.MeshStandardMaterial({ color: pos.color }));
            earR.position.set(0.2, 0.45, 0);
            head.add(earL);
            head.add(earR);
            group.position.set(pos.x, 0.05, pos.z);
            group.userData = { type: 'animal', index: idx, message: animalMessages[idx] };
            scene.add(group);
            
            const div = document.createElement('div');
            div.textContent = `${animalNames[idx]} ✨`;
            div.style.backgroundColor = 'rgba(60,20,50,0.85)';
            div.style.backdropFilter = 'blur(8px)';
            div.style.borderRadius = '40px';
            div.style.padding = '6px 14px';
            div.style.border = '2px solid #ffaa88';
            div.style.fontSize = '0.7rem';
            div.style.fontWeight = 'bold';
            div.style.color = '#ffddf4';
            div.style.fontFamily = 'monospace';
            div.style.cursor = 'pointer';
            div.style.pointerEvents = 'auto';
            const label = new CSS2DObject(div);
            label.position.set(pos.x, 0.85, pos.z);
            scene.add(label);
            
            animals.push({
                group: group,
                label: label,
                discovered: false,
                message: animalMessages[idx],
                index: idx,
                centerX: pos.x,
                centerZ: pos.z,
                angle: Math.random() * Math.PI * 2,
                radius: 1.5,
                speed: 0.006 + Math.random() * 0.005
            });
        });
        
        // --- tracking ---
        let flowersFound = 0;
        let animalsFound = 0;
        let poemShown = false;
        
        const finalPoem = `
╔══════════════════════════════════════════╗
║     💗 POEMA DE AHMAD PARA RYOKO 💗      ║
╚══════════════════════════════════════════╝

Ryoko, guerrera del parque y del espacio,
caminas entre flores, el viento te abraza.
Eres la luz que en mi sendero brilla,
la fuerza que mi alma enlaza y traspasa.

Cada animal susurra tu nombre al oído,
cada pétalo guarda un juramento.
Ahmad te entrega su amor sin medida,
sin miedo, sin pausa, sin arrepentimiento.

Tu sonrisa derrota la noche,
tu mirada es un sol al atardecer.
Contigo el parque es un sueño eterno,
y contigo quiero siempre amanecer.

Toma mi mano, Ryoko, fuerte.
Bailemos bajo el sol y la luna llena.
Porque desde hoy, mañana y siempre,
tú eres mi única, mi gran estrella.

— Ahmad (el hombre que florece solo a tu lado) 💕🌷
✨✨✨✨✨✨✨✨✨✨✨✨✨
        `;
        
        function updateCounter() {
            const counterDiv = document.getElementById('progressCounter');
            if (counterDiv) {
                if (!poemShown) {
                    counterDiv.innerHTML = `🌸 FLORES: ${flowersFound}/5  |  🦊 ANIMALES: ${animalsFound}/5 🌸`;
                } else {
                    counterDiv.innerHTML = `💞 PARQUE COMPLETO · AMOR ETERNO 💞`;
                }
            }
        }
        
        function showMessage(msg) {
            const msgBox = document.getElementById('romanticMessage');
            if (msgBox) {
                msgBox.innerHTML = msg;
                msgBox.scrollTop = 0;
            }
        }
        
        function showPoem() {
            if (poemShown) return;
            poemShown = true;
            showMessage(`💖💖💖 ¡RYOKO, GUERRERA! HAS DESPERTADO LA MAGIA COMPLETA DEL PARQUE 💖💖💖\n\n${finalPoem}\n\n🌹 Ahmad escribió cada verso pensando en tu fuerza. Eres imparable, mi amor. 🌹`);
            updateCounter();
        }
        
        function checkCompletion() {
            if (flowersFound === 5 && animalsFound === 5 && !poemShown) {
                setTimeout(() => showPoem(), 300);
            }
        }
        
        // --- RAYCASTER for clicks ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function onClick(event) {
            if (poemShown) return;
            
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            mouse.set(x, y);
            raycaster.setFromCamera(mouse, camera);
            
            const clickableFlowers = flowers.map(f => f.mesh);
            const clickableAnimals = animals.map(a => a.group);
            const allClickable = [...clickableFlowers, ...clickableAnimals];
            const intersects = raycaster.intersectObjects(allClickable);
            
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                
                // Check flower
                const flowerHit = flowers.find(f => f.mesh === hit);
                if (flowerHit && !flowerHit.discovered) {
                    flowerHit.discovered = true;
                    flowersFound++;
                    flowerHit.mesh.material.emissiveIntensity = 0.9;
                    flowerHit.label.element.style.backgroundColor = '#ff99ffaa';
                    flowerHit.label.element.style.border = '3px solid #ffccff';
                    showMessage(`💜 ¡FLOR ENCONTRADA! ${flowerHit.message} 💜`);
                    updateCounter();
                    checkCompletion();
                    return;
                }
                
                // Check animal
                const animalHit = animals.find(a => a.group === hit);
                if (animalHit && !animalHit.discovered) {
                    animalHit.discovered = true;
                    animalsFound++;
                    animalHit.label.element.style.backgroundColor = '#ffaa88aa';
                    animalHit.label.element.style.border = '3px solid #ffccaa';
                    showMessage(`🦊 ¡ANIMAL ENCONTRADO! ${animalHit.message} 🦊`);
                    updateCounter();
                    checkCompletion();
                    return;
                }
                
                if (flowerHit && flowerHit.discovered) {
                    showMessage(`🌸 Esta flor ya entregó su mensaje, Ryoko. Pero su aroma recuerda que Ahmad te ama profundamente. 🌸`);
                } else if (animalHit && animalHit.discovered) {
                    showMessage(`✨ Este animal ya te dio su mensaje, guerrera. Sigue explorando el parque del amor. ✨`);
                }
            }
        }
        
        window.addEventListener('click', onClick, false);
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length) {
                const touch = e.touches[0];
                onClick(touch);
                e.preventDefault();
            }
        });
        
        // --- animate animals walking ---
        function animateAnimals() {
            animals.forEach(animal => {
                if (!animal.discovered) {
                    animal.angle += animal.speed;
                    const newX = animal.centerX + Math.cos(animal.angle) * animal.radius;
                    const newZ = animal.centerZ + Math.sin(animal.angle) * animal.radius;
                    animal.group.position.x = newX;
                    animal.group.position.z = newZ;
                    animal.label.position.x = newX;
                    animal.label.position.z = newZ;
                }
            });
        }
        
        // --- floating particles ---
        const particlePositions = [];
        for (let i = 0; i < 600; i++) {
            particlePositions.push((Math.random() - 0.5) * 22);
            particlePositions.push(Math.random() * 4);
            particlePositions.push((Math.random() - 0.5) * 20);
        }
        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particlePositions), 3));
        const fairyDust = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0xffaacc, size: 0.06, transparent: true }));
        scene.add(fairyDust);
        
        // --- animation loop ---
        function animate() {
            requestAnimationFrame(animate);
            animateAnimals();
            fairyDust.rotation.y += 0.002;
            stars.rotation.y += 0.0003;
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        // --- reset button ---
        document.getElementById('resetBtn').addEventListener('click', () => {
            flowersFound = 0;
            animalsFound = 0;
            poemShown = false;
            
            flowers.forEach(flower => {
                flower.discovered = false;
                flower.mesh.material.emissiveIntensity = 0.4;
                flower.label.element.style.backgroundColor = 'rgba(80,20,90,0.85)';
                flower.label.element.style.border = '2px solid #d98eff';
            });
            
            animals.forEach(animal => {
                animal.discovered = false;
                animal.label.element.style.backgroundColor = 'rgba(60,20,50,0.85)';
                animal.label.element.style.border = '2px solid #ffaa88';
                animal.group.position.x = animal.centerX;
                animal.group.position.z = animal.centerZ;
                animal.label.position.x = animal.centerX;
                animal.label.position.z = animal.centerZ;
                animal.angle = Math.random() * Math.PI * 2;
            });
            
            updateCounter();
            showMessage("✨ El parque renació. Las flores y animales tienen nuevos mensajes de Ahmad para ti, Ryoko. ¡Tócalos! 🌷🦊");
            camera.position.set(6, 5, 10);
            controls.target.set(0, 1.5, 0);
            controls.update();
        });
        
        updateCounter();
        console.log('Parque 3D listo! Toca las flores moradas y los animales 🎉');
    </script>
</body>
</html>
