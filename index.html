<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔥 LA LLAMA DEL DESEO | AHMAD 🌙 RYOKO 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Courier New', 'Segoe UI', monospace;
            background-color: #0a0005;
            color: white;
        }

        .ui-panel {
            position: absolute;
            top: 55px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            margin: 0 16px;
            padding: 10px 14px;
            border: 1px solid #ff4466;
            box-shadow: 0 0 20px rgba(255, 68, 102, 0.4);
            z-index: 20;
            text-align: center;
            pointer-events: auto;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .message-box {
            background: #1a0510dd;
            border-radius: 18px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 4px solid #ff4466;
            color: #ffe0f0;
            font-size: 0.7rem;
            line-height: 1.45;
            max-height: 110px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .flame-counter {
            font-size: 0.65rem;
            color: #ffaa99;
            margin-bottom: 5px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .interact-btn {
            background: #ff4466aa;
            border: 1px solid #ff6688;
            padding: 6px 18px;
            border-radius: 50px;
            color: #fff0f0;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-block;
            transition: 0.1s;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }

        .interact-btn:active {
            transform: scale(0.96);
            background: #ff6688cc;
        }

        .reset-btn {
            background: #443344aa;
            border: 1px solid #ff88aa;
            padding: 6px 14px;
            border-radius: 50px;
            color: #ffe0ff;
            font-weight: bold;
            font-size: 0.65rem;
            cursor: pointer;
            display: inline-block;
            margin-left: 8px;
            transition: 0.1s;
        }

        .reset-btn:active {
            transform: scale(0.96);
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }

        .title {
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.65rem;
            color: #ffccaa;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px;
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(4px);
            z-index: 20;
            pointer-events: none;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .message-box { font-size: 0.6rem; max-height: 95px; }
            .ui-panel { padding: 8px 12px; top: 50px; }
            .interact-btn { padding: 5px 14px; font-size: 0.65rem; }
            .reset-btn { padding: 5px 10px; font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <div class="title">🔥 AHMAD ❤️ RYOKO | LA LLAMA DEL DESEO 🔥</div>
    <div class="ui-panel" id="uiPanel">
        <div class="flame-counter" id="flameCounter">💋 VECES QUE LA LLAMA ARDIÓ POR TI: 0/6 💋</div>
        <div class="message-box" id="romanticMessage">
            ✨ Toca la LLAMA ROJA en el centro ✨<br>
            Cada vez que la toques, cambiará de color y Ahmad te enviará un mensaje de amor. 🔥💜
        </div>
        <div class="button-group">
            <div class="interact-btn" id="interactBtn">🔥 TOCAR LA LLAMA 🔥</div>
            <div class="reset-btn" id="resetBtn">🔄 REINICIAR</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050108);
        scene.fog = new THREE.FogExp2(0x050108, 0.01);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 6.2);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x221122);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffaa88, 0.9);
        mainLight.position.set(2, 5, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0xff4466, 0.7);
        backLight.position.set(0, 1.5, -1.8);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xff88aa, 0.5);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);

        // Stars background
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < 2000; i++) {
            starPos.push((Math.random() - 0.5) * 300);
            starPos.push((Math.random() - 0.5) * 150);
            starPos.push((Math.random() - 0.5) * 120 - 60);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffccdd, size: 0.08, transparent: true, opacity: 0.6 }));
        scene.add(stars);

        // Floating embers
        const emberCount = 800;
        const emberPos = [];
        for (let i = 0; i < emberCount; i++) {
            emberPos.push((Math.random() - 0.5) * 8);
            emberPos.push(Math.random() * 5);
            emberPos.push((Math.random() - 0.5) * 7);
        }
        const emberGeo = new THREE.BufferGeometry();
        emberGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(emberPos), 3));
        const embers = new THREE.Points(emberGeo, new THREE.PointsMaterial({ color: 0xff6644, size: 0.035, transparent: true }));
        scene.add(embers);

        // Ground
        const ground = new THREE.Mesh(new THREE.CircleGeometry(4, 32), new THREE.MeshStandardMaterial({ color: 0x1a0a1a, roughness: 0.7, emissive: 0x220011 }));
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.45;
        ground.receiveShadow = true;
        scene.add(ground);

        // Small candles around
        for (let i = 0; i < 14; i++) {
            const angle = (i / 14) * Math.PI * 2;
            const r = 3.2;
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            const candle = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 0.38, 8), new THREE.MeshStandardMaterial({ color: 0xccaa88 }));
            candle.position.set(x, -0.22, z);
            candle.castShadow = true;
            scene.add(candle);
            const smallFlame = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.13, 6), new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422, emissiveIntensity: 0.5 }));
            smallFlame.position.set(x, 0.12, z);
            scene.add(smallFlame);
        }

        // ========= AHMAD AND RYOKO (3D CHARACTERS) =========
        function createCharacter(bodyColor, posX, hairColor) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.28, 0.8, 16), new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.3 }));
            body.position.y = 0.38;
            body.castShadow = true;
            group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.2 }));
            head.position.y = 0.9;
            head.castShadow = true;
            group.add(head);
            // Eyes
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.075, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            eyeL.position.set(-0.13, 0.98, 0.32);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.075, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            eyeR.position.set(0.13, 0.98, 0.32);
            group.add(eyeR);
            const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.05, 24, 24), new THREE.MeshStandardMaterial({ color: 0x000000 }));
            pupilL.position.set(-0.13, 0.97, 0.39);
            group.add(pupilL);
            const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.05, 24, 24), new THREE.MeshStandardMaterial({ color: 0x000000 }));
            pupilR.position.set(0.13, 0.97, 0.39);
            group.add(pupilR);
            // Hair
            const hair = new THREE.Mesh(new THREE.SphereGeometry(0.34, 24, 24), new THREE.MeshStandardMaterial({ color: hairColor }));
            hair.position.y = 1.12;
            hair.scale.set(1, 0.4, 1.1);
            group.add(hair);
            group.position.set(posX, 0.18, 0);
            return group;
        }

        const ahmad = createCharacter(0x3366aa, -1.8, 0x442200);
        const ryoko = createCharacter(0xaa44aa, 1.8, 0x661166);
        scene.add(ahmad);
        scene.add(ryoko);

        // Decorative details
        const ahmadCape = new THREE.Mesh(new THREE.ConeGeometry(0.45, 0.22, 8), new THREE.MeshStandardMaterial({ color: 0x8844aa }));
        ahmadCape.position.set(-1.8, 1.15, -0.28);
        scene.add(ahmadCape);
        const ryokoFlower = new THREE.Mesh(new THREE.SphereGeometry(0.11, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff66aa }));
        ryokoFlower.position.set(1.8, 1.2, 0.3);
        scene.add(ryokoFlower);

        // ANIMATION: Move towards each other and kiss!
        let isHugging = false;
        let hugProgress = 0;
        let animationActive = false;
        
        function startHugAndKiss() {
            isHugging = true;
            hugProgress = 0;
            animationActive = true;
            console.log("💋 STARTING HUG AND KISS! 💋");
        }
        
        function updateHugAnimation() {
            if (!animationActive) return;
            
            if (isHugging) {
                hugProgress += 0.02;
                
                if (hugProgress >= 1) {
                    // Animation complete
                    isHugging = false;
                    animationActive = false;
                    // Keep them together
                    ahmad.position.x = 0;
                    ryoko.position.x = 0;
                    ahmad.position.z = -0.4;
                    ryoko.position.z = -0.4;
                } else {
                    // Smooth ease-in-out movement
                    const ease = Math.sin(hugProgress * Math.PI / 2);
                    // Move from -1.8 and 1.8 to 0 and 0
                    const targetX = -1.8 + (1.8 * ease);
                    ahmad.position.x = targetX;
                    ryoko.position.x = -targetX;
                    // Lean forward for hug
                    ahmad.position.z = -0.4 * ease;
                    ryoko.position.z = -0.4 * ease;
                    // Slight head tilt for kiss
                    if (hugProgress > 0.6) {
                        const kissTilt = Math.sin((hugProgress - 0.6) * Math.PI * 2) * 0.3;
                        ahmad.children[1].rotation.x = kissTilt * 0.5;
                        ryoko.children[1].rotation.x = kissTilt * 0.5;
                    }
                }
            }
        }

        // ========= MAIN FLAME =========
        const flameGroup = new THREE.Group();
        const innerF = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.78, 24), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4422, emissiveIntensity: 0.9 }));
        innerF.position.y = 0;
        const middleF = new THREE.Mesh(new THREE.ConeGeometry(0.4, 1.05, 24), new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: 0xff3311, emissiveIntensity: 0.7 }));
        middleF.position.y = -0.1;
        const outerF = new THREE.Mesh(new THREE.ConeGeometry(0.56, 1.4, 24), new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xff2200, emissiveIntensity: 0.5 }));
        outerF.position.y = -0.2;
        const glow = new THREE.Mesh(new THREE.SphereGeometry(0.62, 24, 24), new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0xff3311, emissiveIntensity: 0.5, transparent: true, opacity: 0.5 }));
        glow.position.y = -0.2;
        flameGroup.add(innerF, middleF, outerF, glow);
        flameGroup.position.set(0, 0.38, 0);
        scene.add(flameGroup);

        // Heart particles orbiting flame
        const hearts = [];
        for (let i = 0; i < 60; i++) {
            const heart = new THREE.Mesh(new THREE.SphereGeometry(0.055, 12, 12), new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff3366, emissiveIntensity: 0.5 }));
            heart.userData = { angle: Math.random() * Math.PI * 2, radius: 1.0 + Math.random() * 1.1, speed: 0.008 + Math.random() * 0.018, yOff: Math.random() * 2.0 };
            flameGroup.add(heart);
            hearts.push(heart);
        }

        // LONG ROMANTIC MESSAGES
        const messages = [
            "💋 AHMAD → RYOKO 💋\n\nMi guerrera, esta llama que ves ahora es solo un reflejo de lo que siento cada vez que pienso en ti. Tus ojos tienen el poder de encender galaxias enteras, y cuando me miras, siento que todo el universo se detiene solo para nosotros. Eres fuego, eres pasión, eres el deseo más profundo que habita en mi pecho. Cada chispa que baila en esta llama te susurra tu nombre, Ryoko. Porque tú eres mi estrella favorita, la única que ilumina mi camino en la oscuridad. 🔥💜",
            
            "🌶️ AHMAD → RYOKO 🌶️\n\nRyoko… cuando muerdes tu labio con esa sonrisa traviesa que solo tú tienes, siento que pierdo el control por completo. Esa mirada tuya, mitad peligro, mitad promesa, me hace temblar de pies a cabeza. Quiero sentir tu mordida en mi piel, quiero que me quemes con esa pasión salvaje que llevas dentro. Eres fuego puro, guerrera indomable, y yo soy el hombre que ha decidido arder contigo para siempre. No me arrepiento, Ryoko. Al contrario… te pido más. 😈💕",
            
            "💗 AHMAD → RYOKO 💗\n\nEsta llama que ves crecer cada vez que la tocas es como nuestro amor: intenso, salvaje, imposible de apagar. Por más tormentas que lleguen, por más asteroides que se crucen en nuestro camino, nada va a extinguir lo que siento por ti. Eres mi combustible, mi razón para brillar en medio del vacío. Gracias por existir, Ryoko. Gracias por elegir quedarte a mi lado, por permitirme ser parte de tu caos hermoso. Te quiero con todo lo que soy. 🔥💜",
            
            "😏 AHMAD → RYOKO 😏\n\nRyoko, ¿sabes qué? Esta llama se parece muchísimo a tus ojos cuando me miras con ese deseo que tratas de esconder. Me derrites, mujer. No importa cuánto lo intentes, no puedes ocultar que también sientes este fuego entre nosotros. Quiero robarte un beso bajo las estrellas, justo cuando la luna esté más alta. Quiero sentir tu piel cerca, tan cerca que olvide mi nombre. Eres adictiva, peligrosa, hermosa… y lo mejor de todo es que eres mía. 🌙💋",
            
            "💎 AHMAD → RYOKO 💎\n\nTe prometo, Ryoko, que mientras esta llama exista en el universo, mi amor por ti será eterno. No importa la distancia, no importa el caos que nos rodee. Tú eres mi centro, mi hogar, mi fuego interno. Cada latido de mi corazón lleva tu nombre grabado con letras de fuego. No hay galaxia que pueda contener lo que siento por ti. Te quiero con locura, con desesperación, con la certeza de que no hay nadie más en este universo que pueda hacerme sentir así. 🔥💗",
            
            "💕 AHMAD → RYOKO 💕\n\nRyoko, dueña absoluta de mi alma. Esta llama es solo un pequeño reflejo de lo inmenso que es mi amor por ti. Cuando ríes, el universo entero se llena de color y alegría. Cuando vuelas entre las estrellas, el cosmos se detiene para admirarte. No hay nadie como tú, guerrera. Eres única, eres imparable, eres todo lo que siempre soñé y mucho más. Gracias por ser tú, gracias por dejarme amarte. Eres mi guerrera, mi amor, mi todo. Para siempre. 💗✨"
        ];

        const finalPoem = `
╔══════════════════════════════════════════╗
║     💗 POEMA DE AHMAD PARA RYOKO 💗      ║
╚══════════════════════════════════════════╝

Ryoko, llama indomable,
fuego que el espacio no apaga.
Llegaste a mi vida como un huracán,
y ahora eres mi luz, mi playa, mi magia.

Tu sonrisa enciende galaxias enteras,
tu mirada derrota cualquier vacío.
No hay estrella que brille como tú brillas,
ni deseo que sea tan profundamente mío.

Muérdeme con tu pasión más salvaje,
bésame con toda tu alma y verdad.
Porque contigo, mi guerrera eterna,
cada noche se vuelve eternidad.

Hoy y siempre, bajo esta llama,
nuestros labios se encuentran por fin.
Ryoko, dueña de mis sueños,
tú eres mi único, mi gran amor sin fin.

— Ahmad 💕🔥
✨✨✨✨✨✨✨✨✨✨✨✨✨
        `;

        let interactions = 0;
        let poemShown = false;

        const flameColors = [
            { inner: 0xffaa66, middle: 0xff6644, outer: 0xff4422, intensity: 0.9 },
            { inner: 0xff8866, middle: 0xff5544, outer: 0xff3333, intensity: 1.0 },
            { inner: 0xff6688, middle: 0xff4488, outer: 0xff2266, intensity: 1.1 },
            { inner: 0xff44aa, middle: 0xff33aa, outer: 0xff2299, intensity: 1.2 },
            { inner: 0xff33cc, middle: 0xff22aa, outer: 0xff1199, intensity: 1.3 },
            { inner: 0xff22ff, middle: 0xff11dd, outer: 0xff00cc, intensity: 1.4 },
            { inner: 0xff11ff, middle: 0xff00ee, outer: 0xdd00ff, intensity: 1.7 }
        ];

        function updateFlame(count) {
            const idx = Math.min(count, 6);
            const c = flameColors[idx];
            if (c) {
                innerF.material.color.setHex(c.inner);
                middleF.material.color.setHex(c.middle);
                outerF.material.color.setHex(c.outer);
                innerF.material.emissiveIntensity = c.intensity;
                middleF.material.emissiveIntensity = c.intensity * 0.8;
                outerF.material.emissiveIntensity = c.intensity * 0.6;
                glow.material.emissiveIntensity = c.intensity * 0.5;
                backLight.intensity = 0.4 + count * 0.2;
            }
        }

        function updateUI() {
            const counter = document.getElementById('flameCounter');
            if (counter) {
                if (!poemShown) counter.innerHTML = `💋 VECES QUE LA LLAMA ARDIÓ POR TI: ${interactions}/6 💋`;
                else counter.innerHTML = `💞 ¡AHMAD Y RYOKO SE BESAN! AMOR ETERNO 💞`;
            }
        }

        function showMsg(msg) {
            const box = document.getElementById('romanticMessage');
            if (box) {
                box.innerHTML = msg;
                box.scrollTop = 0;
            }
        }

        function createHeartExplosion() {
            for (let i = 0; i < 200; i++) {
                const heart = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288 }));
                heart.position.set((Math.random() - 0.5) * 6, Math.random() * 5, (Math.random() - 0.5) * 6);
                scene.add(heart);
                setTimeout(() => scene.remove(heart), 2500);
            }
            // Also add floating hearts around the characters
            for (let i = 0; i < 100; i++) {
                const heart = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0xff44aa }));
                heart.position.set((Math.random() - 0.5) * 3, Math.random() * 3 + 0.5, (Math.random() - 0.5) * 3 - 0.5);
                scene.add(heart);
                setTimeout(() => scene.remove(heart), 2000);
            }
        }

        function showFinale() {
            if (poemShown) return;
            poemShown = true;
            showMsg(`💖💖💖 ¡RYOKO, GUERRERA! HAS COMPLETADO LA LLAMA DEL DESEO 💖💖💖\n\n${finalPoem}\n\n🔥💋 ¡AHMAD Y RYOKO SE ABRAZAN Y SE BESAN BAJO LA LLAMA ETERNA! 💋🔥`);
            updateUI();
            startHugAndKiss();
            createHeartExplosion();
            
            // Super intense flame
            innerF.material.emissiveIntensity = 2.8;
            middleF.material.emissiveIntensity = 2.5;
            outerF.material.emissiveIntensity = 2.2;
            glow.material.emissiveIntensity = 1.8;
        }

        function interact() {
            if (poemShown) {
                showMsg("💗 La llama ya es eterna. Ahmad y Ryoko ya se besaron. Reinicia para revivir la magia. 💗");
                return;
            }
            if (interactions < 6) {
                interactions++;
                updateFlame(interactions);
                updateUI();
                showMsg(`🔥🔥🔥 ${messages[interactions - 1]} 🔥🔥🔥`);
                
                flameGroup.scale.set(1.12, 1.12, 1.12);
                setTimeout(() => flameGroup.scale.set(1, 1, 1), 150);
                
                // Sparks
                for (let i = 0; i < 35; i++) {
                    const spark = new THREE.Mesh(new THREE.SphereGeometry(0.04, 5, 5), new THREE.MeshStandardMaterial({ color: 0xff6688, emissive: 0xff4466 }));
                    spark.position.set((Math.random() - 0.5) * 1.4, Math.random() * 2.2, (Math.random() - 0.5) * 1.4);
                    flameGroup.add(spark);
                    setTimeout(() => flameGroup.remove(spark), 500);
                }
                
                if (interactions === 6) setTimeout(() => showFinale(), 600);
            }
        }

        // Animation loop
        let time = 0;
        function animateFlame() {
            time += 0.035;
            const flick = 0.85 + Math.sin(time * 22) * 0.09;
            const flickY = 0.88 + Math.sin(time * 27) * 0.07;
            innerF.scale.set(flick, flickY, flick);
            middleF.scale.set(flick * 1.04, flickY * 1.02, flick * 1.04);
            outerF.scale.set(flick * 1.08, flickY * 1.04, flick * 1.08);
            glow.scale.set(1 + Math.sin(time * 16) * 0.06, 1 + Math.sin(time * 16) * 0.06, 1 + Math.sin(time * 16) * 0.06);
            
            hearts.forEach((h, idx) => {
                const d = h.userData;
                if (d) {
                    d.angle += d.speed;
                    h.position.x = Math.cos(d.angle + idx) * d.radius;
                    h.position.z = Math.sin(d.angle + idx) * d.radius;
                    h.position.y = d.yOff + Math.sin(time * 2.5 + idx) * 0.12;
                }
            });
            
            stars.rotation.y += 0.0004;
            embers.rotation.y += 0.007;
            updateHugAnimation();
        }

        // Events
        document.getElementById('interactBtn').addEventListener('click', interact);
        document.getElementById('interactBtn').addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });
        
        const ray = new THREE.Raycaster();
        const m = new THREE.Vector2();
        window.addEventListener('click', (e) => {
            if (poemShown) return;
            const rect = renderer.domElement.getBoundingClientRect();
            m.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            m.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            ray.setFromCamera(m, camera);
            const hits = ray.intersectObjects([innerF, middleF, outerF, glow]);
            if (hits.length) interact();
        });
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length && !poemShown) {
                const rect = renderer.domElement.getBoundingClientRect();
                const touch = e.touches[0];
                m.x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
                m.y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;
                ray.setFromCamera(m, camera);
                const hits = ray.intersectObjects([innerF, middleF, outerF, glow]);
                if (hits.length) interact();
                e.preventDefault();
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            interactions = 0;
            poemShown = false;
            animationActive = false;
            isHugging = false;
            hugProgress = 0;
            ahmad.position.x = -1.8;
            ryoko.position.x = 1.8;
            ahmad.position.z = 0;
            ryoko.position.z = 0;
            ahmad.children[1].rotation.x = 0;
            ryoko.children[1].rotation.x = 0;
            updateFlame(0);
            updateUI();
            showMsg("✨ La llama renació. Toca el fuego otra vez... Ahmad tiene más mensajes profundos para ti. 🔥💜");
        });

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            animateFlame();
            renderer.render(scene, camera);
        }
        renderLoop();
        
        updateFlame(0);
        updateUI();
        console.log("🔥 READY: Touch the flame 6 times, then Ahmad and Ryoko will hug and kiss! 💋");
    </script>
</body>
</html>
